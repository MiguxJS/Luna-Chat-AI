<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg" href="sources/favicon.svg">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat con Luna</title>
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #f3e5f5, #fce4ec, #e1f5fe);
  min-height: 100vh;
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #4b3b2b;
}

#chat {
  background-color: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  width: 100%;
  max-width: 600px;
  border-radius: 20px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  display: flex;
  flex-direction: column;
  padding: 25px 30px;
}

#chat h2 {
  text-align: center;
  margin: 0 0 20px 0;
  color: #6a1b9a;
  font-weight: 700;
  letter-spacing: 1.5px;
}

#messages {
  flex-grow: 1;
  height: 400px;
  overflow-y: auto;
  border: 2px solid #ce93d8;
  border-radius: 12px;
  padding: 15px;
  background-color: #f8f5fb;
  margin-bottom: 20px;
  font-size: 1rem;
  line-height: 1.4;
  scroll-behavior: smooth;

  /* === ESTO ES LO QUE FALTA === */
  display: flex;
  flex-direction: column;
}

/* 1. Para Firefox (estándar moderno) */
#messages {
  scrollbar-width: thin; /* Hace la barra delgada automáticamente */
  scrollbar-color: #ce93d8 transparent; /* Color del thumb y del track */
}

/* 2. Para Chrome, Edge y Safari (motores WebKit) */
#messages::-webkit-scrollbar {
  width: 6px;
}

#messages::-webkit-scrollbar-track {
  background: transparent;
}

#messages::-webkit-scrollbar-thumb {
  background-color: #ce93d8;
  border-radius: 20px;
}

#messages::-webkit-scrollbar-thumb:hover {
  background-color: #ba68c8;
}

.message {
  display: flex;
  align-items: center;  
  gap: 10px;
  margin-bottom: 12px;
  padding: 10px 14px;
  border-radius: 14px;
  max-width: 85%;
  animation: fadeIn 0.25s ease forwards;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  transition: transform 0.2s ease;
}

.user {
  background-color: #c8e6c9;
  color: #2e7d32;
  align-self: flex-end;
  font-weight: 600;
}

.Luna {
  background-color: #e1bee7;
  color: #4a148c;
  align-self: flex-start;
  font-weight: 600;
}

.message-content {
  display: flex;
  flex-direction: column;
  width: 100%;
}
.message:hover {
  transform: translateY(-2px); /* Un pequeño salto al pasar el mouse */
}

/* Ajustes para el Markdown de la IA */
.message-content p { margin: 0 0 5px 0; }
.message-content p:last-child { margin: 0; }
.message-content pre { background: rgba(255,255,255,0.5); padding: 10px; border-radius: 8px; overflow-x: auto; margin: 5px 0;}
.message-content code { background: rgba(255,255,255,0.5); padding: 2px 4px; border-radius: 4px; }
.message-content ul, .message-content ol { margin: 5px 0; padding-left: 20px; }

.message span.name {
  font-size: 0.8rem;
  margin-bottom: 4px;
  opacity: 0.6;
}
.text-wrapper p {
  margin: 0 0 8px 0; /* Espacio entre párrafos de la IA */
}
.text-wrapper p:last-child {
  margin-bottom: 0;
}

.avatar {
  width: 40px;          
  height: 40px;
  min-width: 40px;
  min-height: 40px;
  flex-shrink: 0;
  border-radius: 50%;   
  overflow: hidden;     
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;     
}

/* Estilos limpios para la imagen del avatar */
.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;    
  border-radius: 50%;
}

/* === Nueva animación de puntitos rebotando === */
.typing-indicator {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 4px 0;
}

.typing-indicator span {
  width: 6px;
  height: 6px;
  background-color: #4a148c;
  border-radius: 50%;
  animation: bounce 1.4s infinite ease-in-out both;
}

.typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
.typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

#input-container {
  display: flex;
  gap: 8px;
}

#input {
  flex-grow: 1;
  padding: 12px 18px;
  font-size: 1rem;
  border: 2px solid #ba68c8;
  border-radius: 25px;
  outline: none;
  transition: all 0.3s ease;
}

#input:focus {
  border-color: #f48fb1;
  box-shadow: 0 0 8px #f8bbd0;
}

#input:disabled {
  background-color: #f5f5f5;
  cursor: not-allowed;
}

button {
  background-color: #ba68c8;
  color: white;
  border: none;
  border-radius: 25px;
  padding: 12px 18px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover:not(:disabled) {
  background-color: #ab47bc;
}

button:disabled {
  background-color: #d1c4e9;
  cursor: not-allowed;
}

.extra-btn {
  background-color: #9575cd;
}

.extra-btn:hover:not(:disabled) {
  background-color: #7e57c2;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

@media (max-width: 640px) {
  body {
    padding: 10px; /* Menos espacio en los bordes en móvil */
  }

  #chat {
    width: 100%; /* Que ocupe todo el ancho disponible */
    padding: 15px; /* Ajuste de margen interno */
    border-radius: 15px;
  }

  #input-container {
    flex-wrap: wrap; /* Permite que los botones bajen si no caben */
    gap: 5px;
  }

  #input {
    width: 100%; /* El input ocupa todo el ancho */
  }
  
  /* Ajuste para que los botones de abajo no se salgan */
  .extra-btn {
    padding: 12px 15px;
  }
}
</style>
</head>

<body>
<div id="chat">
  <h2>Chat con Luna 🌙</h2>

  <div id="messages"></div>

  <div id="input-container">
    <input type="text" id="input" placeholder="Escribe tu mensaje aquí..." autocomplete="off" />
    <button id="btn-enviar" onclick="enviarMensaje()">Enviar</button>
    <button class="extra-btn" onclick="descargarChat()" title="Descargar historial de chat">⬇</button>
    <button class="extra-btn" onclick="limpiarChat()" title="Borrar historial">🗑</button>
  </div>
</div>

<audio id="notif">
  <source src="sources/universfield-new-notification-022-370046.mp3">
</audio>

<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const notif = document.getElementById('notif');
const btnEnviar = document.getElementById('btn-enviar');

// Nombre de la llave para el nuevo sistema JSON
const STORAGE_KEY = "lunaChat_v2";

function guardarChat() {
  const historial = [];
  document.querySelectorAll('.message').forEach(div => {
    const nameSpan = div.querySelector('.name');
    // Solo guardamos si tiene nombre (para ignorar el indicador de carga)
    if (nameSpan) { 
      historial.push({
        nombre: nameSpan.innerText,
        texto: div.getAttribute('data-raw-text'), 
        clase: div.classList.contains('Luna') ? 'Luna' : 'user'
        
      });
      if (historial.length > 100) {
  historial.splice(0, historial.length - 100);
}
    }
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(historial));
}

function cargarChat() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    const lista = JSON.parse(saved);
    messages.innerHTML = ""; 
    // Al recargar, cada mensaje se vuelve a procesar por Marked y DOMPurify
    lista.forEach(m => mostrarMensaje(m.nombre, m.texto, m.clase));
  } else {
    mostrarMensaje("Luna", "Holi 💜 soy Luna, ¿cómo te sientes hoy?", "Luna");
  }
}

function descargarChat() {
  const contenido = messages.innerHTML;
  
  // Creamos un "caparazón" de seguridad para el archivo descargado
  const htmlSeguro = `
    <!DOCTYPE html>
    <html lang="es">
    <head>
      <meta charset="UTF-8">
      <meta http-equiv="Content-Security-Policy" 
content="default-src 'self'; 
script-src 'none'; 
style-src 'unsafe-inline'; 
img-src 'self' https://images.unsplash.com https://lh3.googleusercontent.com;">
      <title>Historial Luna</title>
      <style>
        body { font-family: sans-serif; padding: 20px; background: #f8f5fb; line-height: 1.5; }
        .message { margin-bottom: 15px; padding: 10px; border-radius: 10px; max-width: 80%; display: flex; align-items: center; gap: 10px; }
        .Luna { background: #e1bee7; align-self: flex-start; }
        .user { background: #c8e6c9; align-self: flex-end; }
        .avatar img { width: 40px; border-radius: 50%; }
        .name { font-weight: bold; display: block; font-size: 0.8em; opacity: 0.6; }
        .copy-btn { display: none; } /* No necesitamos el botón en el archivo guardado */
      </style>
    </head>
    <body style="display: flex; flex-direction: column;">
      <h2 style="text-align: center; color: #6a1b9a;">Historial de Luna 🌙</h2>
      ${contenido}
    </body>
    </html>
  `;

  const blob = new Blob([htmlSeguro], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `Chat_Luna_${new Date().getTime()}.html`;
  a.click();
}

function limpiarChat() {
  localStorage.removeItem(STORAGE_KEY);
  messages.innerHTML = "";
  mostrarMensaje("Luna", "Holi 💜 soy Luna, ¿cómo te sientes hoy?", "Luna");
  input.focus();
}

function mostrarMensaje(nombre, texto, clase) {
  if (!texto) return;
  
  const autoScroll = messages.scrollTop + messages.clientHeight >= messages.scrollHeight - 50;
  const div = document.createElement('div');
  div.classList.add('message', clase);
  div.setAttribute('data-raw-text', texto); 

  // Markdown + Sanitización
  const rawHtml = clase === "Luna" ? marked.parse(texto) : texto;
  const cleanHtml = DOMPurify.sanitize(rawHtml);

  if (clase === "Luna") {
    div.innerHTML = `
        <div class="avatar"><img src="sources/avatar.jpg" alt="Luna"></div>
        <div class="message-content">
            <span class="name">${nombre}</span>
            <div class="text-wrapper">${cleanHtml}</div>
        </div>`;
  } else {
    div.innerHTML = `
      <div class="message-content">
        <span class="name">${nombre}</span>
        <div class="text-wrapper">${cleanHtml}</div>
      </div>`;
  }

  messages.appendChild(div);
  if (autoScroll) messages.scrollTop = messages.scrollHeight;
  guardarChat();
}

function mostrarTyping() {
  const div = document.createElement('div');
  div.classList.add('message', 'Luna');
  div.innerHTML = `
    <div class="avatar"><img src="sources/avatar.jpg" alt="Luna"></div>
    <div class="message-content">
      <span class="name">Luna</span>
      <div class="typing-indicator"><span></span><span></span><span></span></div>
    </div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function obtenerHistorial() {
  const historial = [];

  document.querySelectorAll('.message').forEach(div => {
    const name = div.querySelector('.name')?.innerText;
    const text = div.getAttribute('data-raw-text');

    if (!text) return;

    historial.push({
      role: name === "Luna" ? "model" : "user",
      content: text
    });
  });

  return historial.slice(-20); // límite igual que backend
}

async function enviarMensaje() {
  const mensaje = input.value.trim();
  if (!mensaje) return;

  input.disabled = true;
  btnEnviar.disabled = true;

  mostrarMensaje("Tú", mensaje, "user");
  input.value = "";
  
  const typing = mostrarTyping();

  try {
    const response = await fetch('https://lunachatai.miguelitosotoacero.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
  message: mensaje,
  history: obtenerHistorial()
})
    });

    const data = await response.json();
    typing.remove();

    const respuestaTexto = data.reply || "No hay respuesta";
    mostrarMensaje("Luna", respuestaTexto, "Luna");
    
    notif.volume = 0.25;
    notif.currentTime = 0;
    notif.play().catch(err => console.log("Audio bloqueado"));

  } catch (error) {
    if(typing) typing.remove();
    mostrarMensaje("Luna", "Ocurrió un error al obtener respuesta.", "Luna");
  } finally {
    input.disabled = false;
    btnEnviar.disabled = false;
    input.focus();
  }
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") enviarMensaje();
});

window.onload = cargarChat;
</script>
</body>
</html>
